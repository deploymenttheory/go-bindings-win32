name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Build & test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      # Generated syscall wrappers trip vet's unsafe.Pointer heuristic by
      # design; vet everything hand-written instead.
      - name: Vet (non-generated packages)
        run: go vet ./cmd/... ./internal/... ./acceptance/ ./bindings/runtime/...

      # amd64 and arm64 share Win32's LLP64 layout, so the same bindings must
      # compile for both; 386 is deliberately excluded by build constraints.
      - name: Cross-compile for windows/arm64
        run: go build ./bindings/...
        env:
          GOOS: windows
          GOARCH: arm64

      - name: Unit tests (winmd reader + ingest)
        run: go test ./internal/...

      - name: Acceptance tests (live Win32 calls + ABI layout gate)
        run: go test ./acceptance/

  regen:
    name: Regeneration determinism gate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Ingest committed winmd
        run: go run ./cmd/generate ingest

      - name: Validate metadata
        run: go run ./cmd/generate validate

      # One command clears and re-emits the single idiomatic-shaped bindings
      # tree, and enforces the diagnostics ratchet.
      - name: Regenerate bindings with ratchet
        run: go run ./cmd/generate bindings --diagnostics-baseline metadata/diagnostics-baseline.json

      - name: Regenerate the ABI acceptance test
        run: go run ./cmd/generate abitest

      - name: Generated output must match the committed tree
        shell: bash
        run: |
          git add -N bindings acceptance
          git diff --exit-code --stat -- bindings acceptance
